<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音无水印下载器 · 粘贴链接即下</title>
<meta name="description" content="免登录、免签名的抖音视频/图集无水印下载工具，粘贴分享链接即可在线预览与下载。">
<style>
:root{
  --bg:#0E1013; --bg-glow-a:rgba(254,44,85,.10); --bg-glow-b:rgba(37,244,238,.06);
  --surface:#16191E; --surface-2:#1C2026; --border:#272C34; --border-strong:#343B45;
  --text:#EDEFF2; --muted:#8A93A0; --faint:#5B6470;
  --accent:#FE2C55; --accent-hover:#FF4D6F; --accent-ink:#FFFFFF; --accent-soft:#33161E;
  --ok:#25F4EE; --ok-ink:#062B29; --danger-bg:#2A161B; --danger-border:#57222E; --danger-text:#FF97AC;
  --shadow:0 24px 60px -24px rgba(0,0,0,.6);
  --radius:16px;
}
:root[data-theme="light"]{
  --bg:#F7F8FA; --bg-glow-a:rgba(224,35,78,.07); --bg-glow-b:rgba(15,168,160,.06);
  --surface:#FFFFFF; --surface-2:#F2F4F7; --border:#E4E7EC; --border-strong:#CBD2DB;
  --text:#17191D; --muted:#6B7280; --faint:#9AA1AC;
  --accent:#E0234E; --accent-hover:#C71D44; --accent-ink:#FFFFFF; --accent-soft:#FDEDF1;
  --ok:#0FA8A0; --ok-ink:#FFFFFF; --danger-bg:#FDECEF; --danger-border:#F5C2CC; --danger-text:#B4173C;
  --shadow:0 20px 50px -24px rgba(23,25,29,.18);
}
*{box-sizing:border-box; margin:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--text); min-height:100vh;
  font-family:"PingFang SC","Hiragino Sans GB","Noto Sans SC","Microsoft YaHei",system-ui,sans-serif;
  font-size:15px; line-height:1.7; -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(720px 400px at 50% -80px, var(--bg-glow-a), transparent 70%),
                   radial-gradient(600px 360px at 82% 8%, var(--bg-glow-b), transparent 70%);
  background-repeat:no-repeat;
}
button{font:inherit; cursor:pointer; border:none; background:none; color:inherit}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:6px}
::selection{background:var(--accent); color:#fff}

.container{max-width:880px; margin:0 auto; padding:0 20px}

/* ---------- nav ---------- */
nav{display:flex; align-items:center; justify-content:space-between; padding:20px 0}
.brand{display:flex; align-items:center; gap:10px; font-weight:700; font-size:16px}
.logo{
  width:32px; height:32px; border-radius:9px; background:#000;
  display:grid; place-items:center; color:#fff; font-size:14px;
  box-shadow:-2px 0 0 rgba(37,244,238,.85), 2px 0 0 rgba(254,44,85,.85);
}
:root[data-theme="light"] .logo{box-shadow:-2px 0 0 rgba(15,168,160,.7), 2px 0 0 rgba(224,35,78,.75)}
.brand small{font-weight:500; color:var(--muted); font-size:12px; margin-left:2px}
.icon-btn{
  width:36px; height:36px; border-radius:10px; display:grid; place-items:center;
  border:1px solid var(--border); background:var(--surface); font-size:15px;
  transition:border-color .15s;
}
.icon-btn:hover{border-color:var(--border-strong)}

/* ---------- hero ---------- */
.hero{text-align:center; padding:52px 0 36px}
h1{font-size:clamp(28px,5.4vw,42px); font-weight:700; line-height:1.25; letter-spacing:-.01em; text-wrap:balance}
h1 .hl{color:var(--accent)}
.hero p{color:var(--muted); margin-top:12px; font-size:16px}

/* ---------- composer ---------- */
.composer{
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  box-shadow:var(--shadow); padding:16px 16px 12px; margin-top:30px;
  transition:border-color .15s;
}
.composer:focus-within{border-color:var(--accent)}
.composer textarea{
  width:100%; min-height:74px; max-height:200px; resize:none; border:none; background:none;
  color:var(--text); font:inherit; font-size:15px; outline:none; padding:4px 6px;
}
.composer textarea::placeholder{color:var(--faint)}
.composer-bar{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:8px; flex-wrap:wrap}
.ghost-btn{
  display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:10px;
  border:1px solid var(--border); color:var(--muted); font-size:13.5px; background:var(--surface-2);
  transition:all .15s;
}
.ghost-btn:hover{color:var(--text); border-color:var(--border-strong)}
.primary-btn{
  display:inline-flex; align-items:center; gap:8px; padding:10px 26px; border-radius:12px;
  background:var(--accent); color:var(--accent-ink); font-weight:600; font-size:15px;
  transition:background .15s, transform .1s;
}
.primary-btn:hover{background:var(--accent-hover)}
.primary-btn:active{transform:scale(.98)}
.primary-btn:disabled{opacity:.55; cursor:not-allowed}
.spinner{
  width:15px; height:15px; border-radius:50%;
  border:2px solid rgba(255,255,255,.35); border-top-color:#fff;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion: reduce){ .spinner{animation-duration:1.6s} }

/* ---------- steps ---------- */
.steps{display:flex; justify-content:center; gap:10px; margin-top:22px; flex-wrap:wrap}
.step-chip{
  display:flex; align-items:center; gap:8px; padding:7px 15px; border-radius:99px;
  border:1px solid var(--border); background:var(--surface); color:var(--muted); font-size:13px;
}
.step-chip b{
  width:18px; height:18px; border-radius:50%; background:var(--surface-2); color:var(--text);
  display:grid; place-items:center; font-size:11px; font-weight:600;
  font-variant-numeric:tabular-nums;
}

/* ---------- alert ---------- */
.alert{
  display:none; margin-top:20px; padding:14px 18px; border-radius:14px;
  background:var(--danger-bg); border:1px solid var(--danger-border); color:var(--danger-text);
  font-size:14px; gap:10px; align-items:flex-start;
}
.alert.show{display:flex}
.alert svg{flex:none; margin-top:3px}

/* ---------- result ---------- */
.result{display:none; margin-top:34px}
.result.show{display:block; animation:rise .35s ease}
@keyframes rise{from{opacity:0; transform:translateY(10px)} to{opacity:1}}
@media (prefers-reduced-motion: reduce){ .result.show{animation:none} }
.card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow); overflow:hidden;
}
.card-body{display:flex; gap:26px; padding:24px}
@media (max-width:680px){ .card-body{flex-direction:column} }
.player-wrap{flex:none; width:min(300px,100%); margin:0 auto}
.player-wrap video{
  width:100%; aspect-ratio:9/16; max-height:480px; border-radius:12px;
  background:#000; display:block; object-fit:contain;
}
.info{flex:1; min-width:0; display:flex; flex-direction:column; gap:14px}
.badge{
  align-self:flex-start; font-size:12px; font-weight:600; letter-spacing:.06em;
  padding:3px 11px; border-radius:99px; background:var(--surface-2);
  border:1px solid var(--border); color:var(--muted);
}
.v-title{font-size:18px; font-weight:600; line-height:1.55; word-break:break-word}
.author-row{display:flex; align-items:center; gap:10px}
.author-row img{width:34px; height:34px; border-radius:50%; background:var(--surface-2); object-fit:cover; display:block}
.author-row .name{font-size:14px; font-weight:500}
.author-row .sub{font-size:12.5px; color:var(--muted)}
.avatar-link{display:block; border-radius:50%; position:relative; transition:transform .15s, box-shadow .15s}
.avatar-link:hover{transform:scale(1.06); box-shadow:0 0 0 2px var(--accent)}
.avatar-link .ph{width:34px; height:34px; border-radius:50%; background:var(--surface-2)}

/* 作者悬停浮层 */
.author-tip{
  position:fixed; z-index:100; left:0; top:0; width:270px; max-width:86vw;
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  box-shadow:var(--shadow); padding:14px 16px; pointer-events:none;
  opacity:0; transform:translateY(4px); transition:opacity .15s, transform .15s;
}
.author-tip.show{opacity:1; transform:translateY(0)}
.author-tip .ah{display:flex; align-items:center; gap:11px}
.author-tip .ah img{width:44px; height:44px; border-radius:50%; object-fit:cover; background:var(--surface-2); flex:none}
.author-tip .an{font-size:15px; font-weight:600; line-height:1.3}
.author-tip .ai{font-size:12px; color:var(--muted); margin-top:2px}
.author-tip .asig{font-size:12.5px; color:var(--muted); margin-top:10px; line-height:1.6;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden}
.author-tip .astats{display:flex; gap:6px; margin-top:12px}
.author-tip .s{flex:1; text-align:center; background:var(--surface-2); border-radius:9px; padding:7px 2px}
.author-tip .s b{display:block; font-size:14px; font-weight:700; font-variant-numeric:tabular-nums}
.author-tip .s span{font-size:11px; color:var(--muted)}
.author-tip .atip{font-size:11px; color:var(--faint); margin-top:10px; text-align:center}
.meta-row{display:flex; gap:22px; flex-wrap:wrap; padding:12px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border)}
.meta-item .k{font-size:12px; color:var(--muted); letter-spacing:.04em}
.meta-item .v{font-size:15px; font-weight:600; font-variant-numeric:tabular-nums}
.stats-row{display:flex; gap:8px; flex-wrap:wrap}
.stat-chip{flex:1; min-width:64px; text-align:center; background:var(--surface-2);
  border:1px solid var(--border); border-radius:11px; padding:9px 4px}
.stat-chip b{display:block; font-size:16px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1.2}
.stat-chip span{font-size:11.5px; color:var(--muted)}
.extras{display:flex; flex-direction:column; gap:7px}
.extra-line{font-size:13px; color:var(--muted); display:flex; gap:6px; align-items:baseline}
.extra-line span{color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.tag-row{display:flex; flex-wrap:wrap; gap:6px}
.tag{font-size:12px; color:var(--accent); background:var(--accent-soft); padding:2px 9px; border-radius:99px}
.actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:auto}
.actions .primary-btn{text-decoration:none}
a.ghost-btn{text-decoration:none}
.tip{font-size:12px; color:var(--faint); margin-top:10px}
.fallback-hint{font-size:12px; color:var(--muted); text-align:center; margin-top:8px}
.fallback-hint a{color:var(--accent)}

/* ---------- album ---------- */
.album-head{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:20px 24px 0; flex-wrap:wrap}
.album-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px; padding:18px 24px 24px;
}
.album-item{position:relative; border-radius:10px; overflow:hidden; background:var(--surface-2); aspect-ratio:3/4}
.album-item img{width:100%; height:100%; object-fit:cover; display:block}
.album-item a, .album-item button{
  position:absolute; right:8px; bottom:8px; width:32px; height:32px; border-radius:9px;
  background:rgba(0,0,0,.55); color:#fff; display:grid; place-items:center;
  backdrop-filter:blur(4px); text-decoration:none; border:none; cursor:pointer;
  opacity:0; transition:opacity .15s;
}
.album-item:hover a, .album-item:hover button, .album-item a:focus-visible, .album-item button:focus-visible{opacity:1}
.album-item .idx{
  position:absolute; left:8px; top:8px; font-size:11px; font-weight:600;
  background:rgba(0,0,0,.5); color:#fff; padding:1px 8px; border-radius:99px;
  backdrop-filter:blur(4px); font-variant-numeric:tabular-nums;
}

/* ---------- footer ---------- */
footer{
  margin-top:70px; padding:26px 0 40px; border-top:1px solid var(--border);
  color:var(--faint); font-size:12.5px; text-align:center; line-height:1.9;
}
</style>
</head>
<body>
<div class="container">

<nav>
  <div class="brand">
    <span class="logo">♪</span>
    抖音下载器 <small>无水印 · 免登录</small>
  </div>
  <button class="icon-btn" id="themeBtn" title="切换主题" aria-label="切换明暗主题">◐</button>
</nav>

<section class="hero">
  <h1>粘贴分享链接<br>拿走<span class="hl">无水印</span>原片</h1>
  <p>支持视频与图集作品 · 在线预览 · 一键下载 · 不需要登录抖音</p>

  <div class="composer">
    <textarea id="input" rows="3" placeholder="粘贴抖音分享文案或链接，例如：3.89 复制打开抖音，看看……https://v.douyin.com/xxxx/"></textarea>
    <div class="composer-bar">
      <div style="display:flex; gap:8px">
        <button class="ghost-btn" id="pasteBtn">📋 粘贴</button>
        <button class="ghost-btn" id="clearBtn">清空</button>
      </div>
      <button class="primary-btn" id="parseBtn">
        <span id="btnSpin" class="spinner" style="display:none"></span>
        <span id="btnText">解析</span>
      </button>
    </div>
  </div>

  <div class="steps">
    <span class="step-chip"><b>1</b>App 内复制分享链接</span>
    <span class="step-chip"><b>2</b>粘贴到上方并解析</span>
    <span class="step-chip"><b>3</b>在线预览 · 下载原片</span>
  </div>

  <div class="alert" id="alert" role="alert">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
      <path d="M8 4.5V8.5M8 11.2V11.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    <span id="alertText"></span>
  </div>
</section>

<section class="result" id="result"></section>

<footer>
  仅供个人学习、收藏及获得授权的素材备份使用 · 内容版权归原作者所有<br>
  未经授权请勿二次发布或商用 · 本工具不存储任何视频与账号数据<br>
  <a href="/admin" style="color:var(--faint)">管理后台</a>
</footer>

</div>

<script>
const $ = (s) => document.querySelector(s);
const input = $('#input'), parseBtn = $('#parseBtn'), alertBox = $('#alert'),
      alertText = $('#alertText'), result = $('#result'),
      btnSpin = $('#btnSpin'), btnText = $('#btnText');

/* ---------- 主题 ---------- */
const root = document.documentElement;
const savedTheme = localStorage.getItem('theme');
if (savedTheme) root.dataset.theme = savedTheme;
else root.dataset.theme = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
$('#themeBtn').onclick = () => {
  root.dataset.theme = root.dataset.theme === 'light' ? 'dark' : 'light';
  localStorage.setItem('theme', root.dataset.theme);
};

/* ---------- 输入区 ---------- */
$('#pasteBtn').onclick = async () => {
  try {
    input.value = await navigator.clipboard.readText();
    input.focus();
  } catch { showError('浏览器未授权读取剪贴板，请手动粘贴（Cmd/Ctrl+V）'); }
};
$('#clearBtn').onclick = () => { input.value = ''; hideError(); result.classList.remove('show'); input.focus(); };
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); parse(); }
});

/* ---------- 报错 ---------- */
function showError(msg){ alertText.textContent = msg; alertBox.classList.add('show'); }
function hideError(){ alertBox.classList.remove('show'); }

/* ---------- 解析 ---------- */
parseBtn.onclick = parse;
async function parse(){
  const text = input.value.trim();
  hideError();
  if (!text) { showError('请先粘贴抖音分享文案或链接'); return; }
  setLoading(true);
  result.classList.remove('show');
  try {
    const resp = await fetch('/api/parse', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text})
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(data.error || `解析失败（HTTP ${resp.status}），请稍后重试`);
    render(data);
  } catch (e) {
    showError(e.message || '网络异常，请检查连接后重试');
  } finally {
    setLoading(false);
  }
}
function setLoading(on){
  parseBtn.disabled = on;
  btnSpin.style.display = on ? '' : 'none';
  btnText.textContent = on ? '解析中…' : '解析';
}

/* ---------- 渲染 ---------- */
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDur = (ms) => {
  const s = Math.round((ms||0)/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
};
const fmtNum = (n) => (n===null||n===undefined) ? '—' : (n>=10000 ? (n/10000).toFixed(1)+'w' : String(n));
const fmtDate = (sec) => { if(!sec) return ''; const d=new Date(sec*1000); const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; };

function statsRow(st){
  if (!st) return '';
  const c = [['❤ 点赞', st.digg], ['💬 评论', st.comment], ['★ 收藏', st.collect], ['↗ 分享', st.share]];
  return `<div class="stats-row">${c.map(([label, n]) =>
    `<div class="stat-chip"><b>${fmtNum(n)}</b><span>${label}</span></div>`).join('')}</div>`;
}

function extrasBlock(d){
  let h = '';
  if (d.music && d.music.title)
    h += `<div class="extra-line">🎵 <span>${esc(d.music.title)}</span></div>`;
  if (d.location)
    h += `<div class="extra-line">📍 <span>${esc(d.location)}</span></div>`;
  if (d.tags && d.tags.length)
    h += `<div class="tag-row">${d.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join('')}</div>`;
  return h ? `<div class="extras">${h}</div>` : '';
}

function render(d){
  if (d.kind === 'note') renderAlbum(d); else renderVideo(d);
  result.classList.add('show');
  result.scrollIntoView({behavior:'smooth', block:'nearest'});
  wireAvatar(d.item_id);
}

function authorRow(d){
  const av = d.avatar ? `<img src="${esc(d.avatar)}" alt="">` : '<div class="ph"></div>';
  const inner = d.author_url
    ? `<a class="avatar-link" href="${esc(d.author_url)}" target="_blank" rel="noopener"
         data-item="${esc(d.item_id)}" title="点击访问 TA 的抖音主页">${av}</a>`
    : av;
  return `<div class="author-row">
    ${inner}
    <div>
      <div class="name">${esc(d.author) || '未知作者'}</div>
      <div class="sub">${d.author_url ? '点击头像访问主页 · 悬停查看资料' : ('作品 ID ' + esc(d.item_id))}</div>
    </div>
  </div>`;
}

/* ---- 作者悬停浮层：悬停 2s 拉取，本地缓存 10 分钟，浮层跟随鼠标 ---- */
const AUTHOR_TTL = 10 * 60 * 1000;   // 本地缓存 10 分钟
let _hoverTimer = null, _tipEl = null, _mouse = {x:0, y:0};

function _tip(){
  if (!_tipEl){
    _tipEl = document.createElement('div');
    _tipEl.className = 'author-tip';
    document.body.appendChild(_tipEl);
  }
  return _tipEl;
}
function _num(n){ return (n===null||n===undefined) ? '—' : (n>=10000 ? (n/10000).toFixed(1)+'w' : n); }
function positionTip(){
  const t = _tip(); const r = t.getBoundingClientRect();
  let x = _mouse.x + 16, y = _mouse.y + 16;
  if (x + r.width > innerWidth - 8) x = _mouse.x - r.width - 16;
  if (y + r.height > innerHeight - 8) y = innerHeight - r.height - 8;
  t.style.left = Math.max(8, x) + 'px';
  t.style.top = Math.max(8, y) + 'px';
}
async function getAuthor(itemId){
  const key = 'dyauthor:' + itemId;
  try {
    const raw = localStorage.getItem(key);
    if (raw){ const o = JSON.parse(raw); if (Date.now() - o.t < AUTHOR_TTL) return o.d; }
  } catch {}
  const r = await fetch('/api/author?item_id=' + encodeURIComponent(itemId));
  if (!r.ok) throw new Error('fetch failed');
  const d = await r.json();
  try { localStorage.setItem(key, JSON.stringify({t: Date.now(), d})); } catch {}
  return d;
}
function showTip(a){
  const t = _tip();
  const stat = (label, n) => `<div class="s"><b>${_num(n)}</b><span>${label}</span></div>`;
  t.innerHTML = `
    <div class="ah">
      ${a.avatar ? `<img src="${esc(a.avatar)}" alt="">` : ''}
      <div class="am">
        <div class="an">${esc(a.nickname) || '未知作者'}</div>
        ${a.douyin_id ? `<div class="ai">抖音号：${esc(a.douyin_id)}</div>` : ''}
      </div>
    </div>
    ${a.signature ? `<div class="asig">${esc(a.signature)}</div>` : ''}
    <div class="astats">
      ${stat('作品', a.aweme_count)}${stat('关注', a.following_count)}
      ${stat('粉丝', a.follower_count)}${stat('获赞', a.total_favorited)}
    </div>
    <div class="atip">点击头像打开抖音主页</div>`;
  t.classList.add('show');
  positionTip();
}
function hideTip(){ if (_tipEl) _tipEl.classList.remove('show'); }

function wireAvatar(itemId){
  const link = result.querySelector('.avatar-link');
  if (!link) return;
  link.addEventListener('mouseenter', () => {
    clearTimeout(_hoverTimer);
    _hoverTimer = setTimeout(async () => {
      try { showTip(await getAuthor(itemId)); } catch {}
    }, 2000);                                    // 悬停满 2 秒才拉取
  });
  link.addEventListener('mousemove', (e) => { _mouse = {x:e.clientX, y:e.clientY};
    if (_tipEl && _tipEl.classList.contains('show')) positionTip(); });
  link.addEventListener('mouseleave', () => { clearTimeout(_hoverTimer); hideTip(); });
}

/* 浏览器直连下载：优先 fetch→blob 带文件名保存（走用户浏览器 IP），
   跨域被拦则退回新窗口打开由浏览器接管，全程不经过本服务器 */
async function browserDownload(url, filename, btn){
  const old = btn ? btn.textContent : null;
  if (btn){ btn.textContent = '下载中…'; btn.style.pointerEvents='none'; }
  try {
    const resp = await fetch(url, {mode:'cors'});
    if(!resp.ok) throw new Error('bad');
    const blob = await resp.blob();
    const obju = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = obju; a.download = filename || 'download';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(obju), 5000);
  } catch(e){
    window.open(url, '_blank', 'noopener');   // 兜底：浏览器直连打开，可右键/长按保存
  } finally {
    if (btn){ btn.textContent = old; btn.style.pointerEvents=''; }
  }
}

function useProxyFallback(el){
  const v = document.querySelector('#player');
  if (v && v.dataset.proxy){ v.src = v.dataset.proxy; v.load(); v.play?.(); el.remove(); }
}

function renderVideo(d){
  result.innerHTML = `
  <div class="card">
    <div class="card-body">
      <div class="player-wrap">
        <video id="player" controls playsinline preload="metadata"
               src="${esc(d.video.url)}" data-proxy="${esc(d.video.proxy_url||'')}"
               ${d.cover ? `poster="${esc(d.cover)}"` : ''}></video>
        <div class="fallback-hint" id="fbHint">
          播放不出来？<a href="javascript:void(0)" onclick="useProxyFallback(document.getElementById('fbHint'))">改用服务器代理播放</a>
        </div>
      </div>
      <div class="info">
        <span class="badge">视频 · 无水印 · 浏览器直连</span>
        <div class="v-title">${esc(d.title)}</div>
        ${authorRow(d)}
        <div class="meta-row">
          <div class="meta-item"><div class="k">时长</div><div class="v">${fmtDur(d.duration_ms)}</div></div>
          <div class="meta-item"><div class="k">分辨率</div><div class="v">${d.video.width&&d.video.height?`${d.video.width}×${d.video.height}`:'720P'}</div></div>
          <div class="meta-item"><div class="k">格式</div><div class="v">MP4</div></div>
          ${d.create_time?`<div class="meta-item"><div class="k">发布</div><div class="v" style="font-size:13px">${fmtDate(d.create_time)}</div></div>`:''}
        </div>
        ${statsRow(d.stats)}
        ${extrasBlock(d)}
        <div class="actions">
          <button class="primary-btn" onclick="browserDownload('${esc(d.video.url)}','${esc(d.video.filename)}',this)">⬇ 下载视频</button>
          <a class="ghost-btn" href="${esc(d.video.url)}" target="_blank" rel="noopener">新窗口打开</a>
        </div>
        <div class="tip">下载与播放均由你的浏览器直连抖音，不经过本站服务器</div>
      </div>
    </div>
  </div>`;
}

function renderAlbum(d){
  const imgs = d.images || [];
  result.innerHTML = `
  <div class="card">
    <div class="album-head">
      <div class="info" style="gap:10px">
        <span class="badge">图集 · ${imgs.length} 张原图 · 浏览器直连</span>
        <div class="v-title">${esc(d.title)}</div>
        ${authorRow(d)}
        ${d.create_time?`<div class="sub" style="font-size:12.5px;color:var(--muted)">发布于 ${fmtDate(d.create_time)}</div>`:''}
        ${statsRow(d.stats)}
        ${extrasBlock(d)}
      </div>
      <button class="primary-btn" onclick="downloadAll()">⬇ 下载全部</button>
    </div>
    <div class="album-grid">
      ${imgs.map((im, i) => `
        <figure class="album-item">
          <span class="idx">${i+1}</span>
          <img src="${esc(im.url)}" alt="图集第 ${i+1} 张" loading="lazy">
          <button onclick="browserDownload('${esc(im.url)}','${esc(im.filename)}',this)" title="下载这张" aria-label="下载第 ${i+1} 张">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M7 1.5V9M7 9L4 6M7 9L10 6M2 12.5H12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </figure>`).join('')}
    </div>
  </div>`;
  window._albumImgs = imgs;
}

async function downloadAll(){
  const imgs = window._albumImgs || [];
  for (const im of imgs){ await browserDownload(im.url, im.filename); await new Promise(r=>setTimeout(r,400)); }
}
</script>
